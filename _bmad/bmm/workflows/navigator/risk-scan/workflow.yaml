name: risk-scan
description: "Scan for project risks: stale stories, missing reviews, migration conflicts, test gaps."
author: "BMAD"
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/_bmad/bmm/workflows/navigator/risk-scan"
instructions: "{installed_path}/instructions.md"
variables:
  sprint_status_file: "{config_source}:implementation_artifacts/sprint-status.yaml"
  agent: "oracle"
input_file_patterns:
  sprint_status:
    description: "Sprint status tracking file"
    whole: "{config_source}:implementation_artifacts/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
standalone: true
