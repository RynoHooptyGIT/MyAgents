name: ship
description: "Commit, push, and create PR — with smart commit messages, BMAD status updates, and story-aware context"
author: "BMAD"
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/_bmad/bmm/workflows/devops/ship"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "forge"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  sprint_status:
    description: "Current sprint status for BMAD tracking"
    whole: "**/_bmad-output/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
standalone: true
