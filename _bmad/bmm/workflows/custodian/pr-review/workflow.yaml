name: pr-review
description: "Multi-pass PR review with confidence scoring — bugs, CLAUDE.md compliance, and historical context"
author: "BMAD"
config_source: "{project-root}/_bmad/bmm/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/_bmad/bmm/workflows/custodian/pr-review"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "sentinel"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  claude_md:
    description: "CLAUDE.md project instructions"
    whole: "**/CLAUDE.md"
    load_strategy: "FULL_LOAD"
standalone: true
