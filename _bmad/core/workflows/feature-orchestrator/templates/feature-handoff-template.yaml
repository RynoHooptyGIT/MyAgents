# Feature Handoff Template
# This file defines the contract between feature agents and the orchestrator
# Feature agents MUST write a handoff file using this schema upon completion

# ============================================================================
# FEATURE IDENTIFICATION
# ============================================================================
feature_id: "feature-XXX"                   # Must match manifest (e.g., feature-001)
feature_name: "Feature Name"                # Human-readable name
agent_persona: "architect"                  # Agent that performed planning: analyst | architect | dev | tea | pm

# ============================================================================
# STATUS INDICATOR (REQUIRED)
# ============================================================================
# This is the MOST CRITICAL field - determines orchestrator's next action
status: "completed"                         # MUST BE ONE OF:
                                            # - "completed": Planning finished successfully
                                            # - "requires_split": Scope too large, needs decomposition
                                            # - "blocked": Cannot proceed without prerequisite work

# ============================================================================
# PLANNING SUMMARY (REQUIRED IF status = "completed")
# ============================================================================
planning_summary:
  # High-level approach (multiline string, 2-4 sentences)
  approach: |
    Brief description of the recommended implementation approach.
    Explain key architectural decisions and patterns to use.
    Mention integration points with existing system.

  # Files to modify (list all existing files that need changes)
  files_to_modify:
    - path: "backend/src/routes/auth.ts"
      reason: "Add new login and logout endpoints"
      complexity: "medium"                  # low | medium | high
      estimated_loc_change: 50              # Approximate lines changed

    - path: "backend/src/models/user.ts"
      reason: "Add refresh_token field to User model"
      complexity: "low"
      estimated_loc_change: 5

  # Files to create (list all new files needed)
  files_to_create:
    - path: "backend/src/services/token-service.ts"
      reason: "JWT token generation and validation logic"
      complexity: "medium"
      estimated_loc: 120

    - path: "backend/src/middleware/auth.ts"
      reason: "Authentication middleware for protected routes"
      complexity: "low"
      estimated_loc: 40

  # Dependencies (both internal and external)
  dependencies:
    # Internal dependencies (within codebase)
    internal:
      - "User model must have email and password fields"
      - "Express app must have cookie-parser middleware configured"
      - "Database connection must be established before auth routes"

    # External dependencies (npm packages, services, etc.)
    external:
      - package: "jsonwebtoken"
        version: "^9.0.0"
        reason: "JWT token generation and verification"

      - package: "bcryptjs"
        version: "^2.4.3"
        reason: "Password hashing"

      - package: "cookie-parser"
        version: "^1.4.6"
        reason: "Parse authentication cookies"

  # Risks and mitigations
  risks:
    - description: "Token secret management"
      severity: "high"                      # low | medium | high | critical
      mitigation: |
        Store JWT secret in environment variable.
        Use strong random secret (32+ characters).
        Rotate secret periodically in production.

    - description: "Refresh token storage"
      severity: "medium"
      mitigation: |
        Store refresh tokens in httpOnly cookies.
        Implement refresh token rotation on each use.
        Set appropriate expiration times.

  # Configuration changes needed
  configuration_changes:
    - file: ".env.example"
      changes: |
        Add JWT_SECRET and JWT_REFRESH_SECRET variables
        Add JWT_EXPIRES_IN and REFRESH_TOKEN_EXPIRES_IN

    - file: "backend/src/config.ts"
      changes: |
        Load JWT configuration from environment
        Validate that JWT secrets are set

  # Database migrations (if applicable)
  database_migrations:
    - description: "Add refresh_token column to users table"
      type: "schema_change"
      sql: |
        ALTER TABLE users
        ADD COLUMN refresh_token VARCHAR(255),
        ADD COLUMN refresh_token_expires_at TIMESTAMP;

# ============================================================================
# ESTIMATED COMPLEXITY (REQUIRED)
# ============================================================================
estimated_complexity:
  size: "medium"                            # small | medium | large | xlarge
  effort_days: 3                            # Developer days to implement
  token_budget_used: 6500                   # Actual tokens used by this agent
  confidence: "high"                        # low | medium | high (estimation confidence)

  # Breakdown by work type
  breakdown:
    backend_hours: 16
    frontend_hours: 0
    testing_hours: 4
    documentation_hours: 2
    total_hours: 22

# ============================================================================
# SPLIT REQUEST (REQUIRED IF status = "requires_split")
# ============================================================================
requires_split: false                       # Set to true if scope too large

# If requires_split = true, provide split rationale and proposed features
split_rationale: null                       # Why split is needed (multiline string)
  # Example:
  # split_rationale: |
  #   During exploration, discovered feature scope is actually 3 separate concerns:
  #   1. Authentication backend (8 files, 5 days)
  #   2. Session management infrastructure (4 files, 3 days)
  #   3. Frontend login forms (6 files, 2 days)
  #
  #   Each concern is substantial enough for separate planning and can be
  #   parallelized. Recommend split for better context management.

proposed_features: null                     # List of proposed split features
  # Example:
  # proposed_features:
  #   - feature_name: "JWT Authentication Backend"
  #     scope: "Implement JWT token generation, validation, and refresh logic"
  #     estimated_effort_days: 5
  #     priority: 1                         # Execution order
  #
  #   - feature_name: "Session Management Infrastructure"
  #     scope: "Redis-based session store with automatic cleanup"
  #     estimated_effort_days: 3
  #     priority: 2
  #     depends_on: "JWT Authentication Backend"

partial_plan: null                          # Any planning completed before split
  # Include files explored, patterns identified, decisions made
  # This helps new feature agents bootstrap from your work

# ============================================================================
# BLOCKED STATUS (REQUIRED IF status = "blocked")
# ============================================================================
blocked_by: []                              # List of blocking issues

# If status = "blocked", provide blocking details
# Example:
# blocked_by:
#   - issue: "User model missing password field"
#     type: "prerequisite_work"             # prerequisite_work | architecture_decision | external_dependency
#     description: |
#       Current User model doesn't have password field. Need to:
#       1. Add password field to User model
#       2. Create migration for existing users
#       3. Update user creation logic
#     proposed_prerequisite_feature:
#       feature_name: "User Model Password Field"
#       scope: "Add password authentication to User model"
#       estimated_effort_days: 1

current_feature_plan_if_unblocked: null     # Plan assuming blocker resolved
  # Provide the plan you would implement if blocker didn't exist
  # This helps orchestrator sequence work properly

# ============================================================================
# NEXT STEPS (REQUIRED)
# ============================================================================
next_steps:
  - "Review security considerations for JWT secret management"
  - "Validate refresh token rotation approach with team"
  - "Confirm cookie settings (httpOnly, secure, sameSite)"
  - "Proceed to implementation via dev-story workflow"

# ============================================================================
# METADATA (REQUIRED)
# ============================================================================
metadata:
  agent_execution_time_seconds: 300         # How long agent took
  files_explored: 23                        # Count of files read
  grep_searches: 8                          # Count of grep operations
  directories_explored: 5                   # Count of directories scanned

  # Key findings during exploration
  key_findings:
    - "Existing authentication uses session-based approach (Express sessions)"
    - "Database already has users table with email field"
    - "Frontend uses Axios for API calls with credentials: 'include'"
    - "Project follows Express.js best practices with middleware pattern"

  # Patterns identified in codebase
  patterns_identified:
    - pattern_name: "Error handling middleware"
      location: "backend/src/middleware/error.ts"
      relevance: "Should use same pattern for auth errors"

    - pattern_name: "Service layer separation"
      location: "backend/src/services/"
      relevance: "Create token-service following this pattern"

  # Potential issues discovered
  potential_issues:
    - "No existing rate limiting on API endpoints - may need for login"
    - "User password not currently hashed - migration strategy needed"

  # Questions for clarification (if any)
  clarification_questions: []
    # Example:
    # - "Should we maintain backwards compatibility with session auth?"
    # - "Is OAuth integration planned for future?"

# ============================================================================
# CROSS-FEATURE CONSIDERATIONS (OPTIONAL)
# ============================================================================
# Use this section if you discovered impacts on other features

cross_feature_considerations: []
  # Example:
  # cross_feature_considerations:
  #   - related_feature: "User Dashboard"
  #     consideration: |
  #       Dashboard will need to handle 401 responses for expired tokens.
  #       Recommend implementing automatic token refresh in dashboard API client.
  #
  #   - related_feature: "Test Suite"
  #     consideration: |
  #       Tests will need mock tokens and test users with valid credentials.
  #       Consider creating test helper for generating valid JWT tokens.

# ============================================================================
# ARCHITECTURAL DECISIONS (OPTIONAL)
# ============================================================================
# Document key architectural decisions made during planning

architectural_decisions: []
  # Example:
  # architectural_decisions:
  #   - decision: "Use JWT instead of sessions"
  #     rationale: |
  #       JWT enables stateless authentication, better for horizontal scaling.
  #       Allows frontend and backend to be deployed separately.
  #     alternatives_considered:
  #       - "Express sessions (current approach)"
  #       - "Passport.js with JWT strategy"
  #     trade_offs: |
  #       Pro: Stateless, scalable, frontend-friendly
  #       Con: Cannot invalidate tokens before expiration (use short TTL + refresh)

# ============================================================================
# IMPLEMENTATION NOTES (OPTIONAL)
# ============================================================================
# Additional notes for implementation team

implementation_notes: []
  # Example:
  # implementation_notes:
  #   - "Follow existing error response format: { success: false, message: '...' }"
  #   - "Add JSDoc comments to all exported functions"
  #   - "Use existing logger utility (backend/src/utils/logger.ts)"
  #   - "Ensure all database queries use parameterized statements (SQL injection prevention)"

# ============================================================================
# TESTING RECOMMENDATIONS (OPTIONAL)
# ============================================================================
# Suggest test scenarios for this feature

testing_recommendations:
  unit_tests:
    - "Token generation with valid user data"
    - "Token validation with valid/invalid/expired tokens"
    - "Password hashing and comparison"
    - "Refresh token rotation logic"

  integration_tests:
    - "POST /auth/login with valid credentials returns tokens"
    - "POST /auth/login with invalid credentials returns 401"
    - "POST /auth/logout clears tokens"
    - "Protected route access with valid token succeeds"
    - "Protected route access without token returns 401"

  edge_cases:
    - "Concurrent login from multiple devices"
    - "Token refresh before expiration"
    - "Token refresh after expiration"
    - "Login with deleted user account"

# ============================================================================
# VALIDATION INSTRUCTIONS
# ============================================================================

# ORCHESTRATOR VALIDATION:
# The orchestrator will validate this handoff file by checking:
# 1. Required fields are present and non-null based on status
# 2. status is one of: completed | requires_split | blocked
# 3. If status = "completed": planning_summary, estimated_complexity, next_steps present
# 4. If status = "requires_split": split_rationale and proposed_features present
# 5. If status = "blocked": blocked_by list is non-empty
# 6. YAML is valid and parseable
# 7. File paths are relative to project root
# 8. Complexity values use defined enums (low|medium|high, etc.)

# FEATURE AGENT RESPONSIBILITIES:
# 1. Explore codebase thoroughly before planning
# 2. Identify existing patterns and follow them
# 3. Document all findings, even if not directly related
# 4. Be conservative with effort estimates (add buffer)
# 5. Call out risks early and suggest mitigations
# 6. If scope is too large, split rather than proceeding
# 7. If blocked, propose prerequisite feature clearly
# 8. Write handoff file even if planning incomplete (with appropriate status)
# 9. Use relative paths from project root consistently
# 10. Track token usage and report in metadata
