name: query-optimization
description: "SQL query optimization with EXPLAIN ANALYZE and index strategy"
author: "BMAD"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/data/query-optimization"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "oracle"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  models:
    description: "SQLAlchemy models directory"
    whole: "backend/app/models/"
    load_strategy: "DIRECTORY_LISTING"
  migrations:
    description: "Alembic migrations directory"
    whole: "backend/alembic/versions/"
    load_strategy: "DIRECTORY_LISTING"
standalone: true
