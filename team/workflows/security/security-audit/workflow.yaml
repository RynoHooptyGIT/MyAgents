name: security-audit
description: "Comprehensive security review covering auth middleware, JWT handling, tenant isolation, SQL injection prevention, CORS configuration, and audit logging"
author: "BMAD"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/security/security-audit"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "shield"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
standalone: true
