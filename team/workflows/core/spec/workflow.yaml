# Spec - Intent Distillation Workflow
name: "spec"
description: "Distill any intent input (brain dump, PRD, brief, transcript, Slack thread, multi-source) into a tight SPEC.md kernel with five fields: Why, Capabilities, Constraints, Non-goals, Success signal. The machine contract every downstream skill consumes."
author: "BMad Method v6.8.0 (ported)"

config_source: "{project-root}/team/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated
planning_artifacts: "{config_source}:planning_artifacts"
output_folder: "{config_source}:output_folder"

installed_path: "{project-root}/team/workflows/core/spec"
template: false
instructions: "{installed_path}/instructions.md"

variables:
  spec_output_path: "{planning_artifacts}/specs"
  project_context: "**/project-context.md"

standalone: true
