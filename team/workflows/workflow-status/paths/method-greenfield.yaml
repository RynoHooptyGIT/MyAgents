# BMad Method - Greenfield
# Full product + architecture planning for greenfield projects (10-50+ stories typically)

method_name: "BMad Method"
track: "bmad-method"
field_type: "greenfield"
description: "Complete product and system design methodology for greenfield projects"

phases:
  - phase: 1
    name: "Analysis (Optional)"
    optional: true
    note: "User-selected during workflow-init"
    workflows:
      - id: "brainstorm-project"
        exec: "{project-root}/team/workflows/brainstorming/workflow.md"
        optional: true
        agent: "analyst"
        command: "/team:brainstorming"
        included_by: "user_choice"
        note: "Uses core brainstorming workflow with project context template"

      - id: "research"
        exec: "{project-root}/team/workflows/analysis/research/workflow.md"
        optional: true
        agent: "analyst"
        command: "/team:research"
        included_by: "user_choice"
        note: "Can have multiple research workflows"

      - id: "product-brief"
        exec: "{project-root}/team/workflows/analysis/create-product-brief/workflow.md"
        optional: true
        agent: "analyst"
        command: "/team:create-product-brief"
        included_by: "user_choice"
        note: "Recommended for greenfield Method projects"

  - phase: 2
    name: "Planning"
    required: true
    workflows:
      - id: "prd"
        exec: "{project-root}/team/workflows/planning/prd/workflow.md"
        required: true
        agent: "pm"
        command: "/team:create-prd"
        output: "Product Requirements Document with FRs and NFRs"

      - id: "create-ux-design"
        conditional: "if_has_ui"
        exec: "{project-root}/team/workflows/planning/create-ux-design/workflow.md"
        agent: "ux-designer"
        command: "/team:create-ux-design"
        note: "Determined after PRD - user/agent decides if needed"

  - phase: 3
    name: "Solutioning"
    required: true
    workflows:
      - id: "create-architecture"
        required: true
        exec: "{project-root}/team/workflows/solutioning/create-architecture/workflow.md"
        agent: "architect"
        command: "/team:create-architecture"
        output: "System architecture document"
        note: "Complete system design for greenfield projects"

      - id: "create-epics-and-stories"
        required: true
        exec: "{project-root}/team/workflows/solutioning/create-epics-and-stories/workflow.md"
        agent: "pm"
        command: "/team:create-epics-and-stories"
        note: "Required: Break down PRD into implementable epics and stories with full context (PRD + UX + Architecture)"

      - id: "test-design"
        optional: true
        workflow: "{project-root}/team/workflows/testarch/test-design/workflow.yaml"
        agent: "tea"
        command: "/team:test-design"
        output: "System-level testability review"
        note: "Testability assessment before gate check - auto-detects system-level mode"

      - id: "implementation-readiness"
        required: true
        exec: "{project-root}/team/workflows/solutioning/check-implementation-readiness/workflow.md"
        agent: "architect"
        command: "/team:implementation-readiness"
        note: "Validates PRD + Architecture + Epics + UX (optional)"

  - phase: 4
    name: "Implementation"
    required: true
    workflows:
      - id: "sprint-planning"
        required: true
        workflow: "{project-root}/team/workflows/implementation/sprint-planning/workflow.yaml"
        agent: "sm"
        command: "/team:sprint-planning"
        note: "Creates sprint plan - subsequent work tracked there"
