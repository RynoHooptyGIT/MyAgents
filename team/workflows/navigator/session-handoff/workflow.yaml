name: session-handoff
description: "Generate a session handoff summary for continuity across AI coding sessions."
author: "BMAD"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/navigator/session-handoff"
instructions: "{installed_path}/instructions.md"
variables:
  sprint_status_file: "{config_source}:implementation_artifacts/sprint-status.yaml"
  agent: "oracle"
input_file_patterns:
  sprint_status:
    description: "Sprint status tracking file"
    whole: "{config_source}:implementation_artifacts/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
standalone: true
