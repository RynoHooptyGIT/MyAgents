name: contract-drift
description: "Detect drift between backend routers and OpenAPI spec, and between frontend API services and actual endpoints"
author: "My Dev Team"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/api-contract/contract-drift"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "pact"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  openapi_spec:
    description: "OpenAPI specification"
    whole: "backend/openapi/openapi.json"
    load_strategy: "FULL_LOAD"
standalone: true
