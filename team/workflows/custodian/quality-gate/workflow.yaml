name: quality-gate
description: "Pre-merge composite check: runs health + pattern + migration audits, produces PASS/FAIL/CONCERNS verdict."
author: "My Dev Team"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/custodian/quality-gate"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "custodian"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
standalone: true
