name: cicd-pipeline
description: "CI/CD pipeline design — lint, test, build, deploy stages for the monorepo"
author: "My Dev Team"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/devops/cicd-pipeline"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "forge"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  docker_compose:
    description: "Docker Compose configuration"
    whole: "docker-compose.yml"
    load_strategy: "FULL_LOAD"
standalone: true
