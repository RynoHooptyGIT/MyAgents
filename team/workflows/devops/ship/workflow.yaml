name: ship
description: "Commit, push, and create PR — with smart commit messages, status updates, and story-aware context"
author: "My Dev Team"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/devops/ship"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "forge"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
  sprint_status:
    description: "Current sprint status for sprint tracking"
    whole: "**/output/sprint-status.yaml"
    load_strategy: "FULL_LOAD"
standalone: true
