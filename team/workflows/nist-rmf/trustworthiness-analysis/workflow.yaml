name: trustworthiness-analysis
description: "Trustworthiness characteristics analysis covering Accuracy, Reliability, Safety, Fairness, Privacy, Security, Transparency, Accountability, and Explainability"
author: "My Dev Team"
config_source: "{project-root}/team/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
installed_path: "{project-root}/team/workflows/nist-rmf/trustworthiness-analysis"
instructions: "{installed_path}/instructions.md"
variables:
  agent: "atlas"
input_file_patterns:
  project_context:
    description: "Project context rules file"
    whole: "**/project-context.md"
    load_strategy: "FULL_LOAD"
standalone: true
