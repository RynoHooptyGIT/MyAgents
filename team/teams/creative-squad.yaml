# <!-- Powered by BMAD-CORE™ -->
bundle:
  name: Creative Squad
  icon: 🎨
  description: Innovation and creative problem solving team with all CIS creative agents
  module: cis
agents: "*"  # All CIS agents: creative-thinking-coach, design-strategy-coach, storyteller-presenter
party: "./default-party.csv"
capabilities:
  best_for:
    - Innovation strategy
    - Creative brainstorming sessions
    - Problem solving with multiple perspectives
    - Design thinking workshops
    - Narrative and storytelling development
    - Presentation design and visual communication
    - Strategic disruption planning
  avoid_for:
    - Technical implementation
    - Code review
    - Routine development tasks
    - Compliance documentation
coordination:
  lead_agent: design-strategy-coach  # Strategist coordinates by default
  delegate_mode: true  # Lead coordinates creative exploration
  require_plan_approval: false  # Creative work is exploratory and iterative
  typical_team_size: 3  # All CIS agents for full creative spectrum
agent_teams_usage:
  when_to_use: "Use agent teams when creative exploration benefits from parallel investigation of different creative methodologies and perspectives"
  example_prompt: "Spawn creative squad to brainstorm innovative solutions for improving customer retention"
  expected_workflow: "Design-strategy coach leads, creative-thinking coach facilitates ideation and problem-solving, storyteller-presenter crafts narratives and visualizes concepts"
