# <!-- Powered by BMAD-CORE™ -->
bundle:
  name: Team Plan and Architect
  icon: 🚀
  description: Cross-functional team for planning and architectural decisions
  module: bmm
agents:
  - analyst
  - architect
  - pm
  - oracle
  - ux-designer
party: "./default-party.csv"
capabilities:
  best_for:
    - Planning new features
    - Architectural decision making
    - Requirements analysis
    - Strategic alignment
    - Cross-functional design reviews
    - Product roadmap planning
  avoid_for:
    - Quick bug fixes
    - Simple implementation tasks
    - Sequential dependent work
    - Routine maintenance
coordination:
  lead_agent: pm  # PM coordinates by default
  delegate_mode: true  # Lead coordinates, teammates implement
  require_plan_approval: true  # All plans need approval before execution
  typical_team_size: 5
agent_teams_usage:
  when_to_use: "Use agent teams when planning requires parallel exploration of multiple perspectives (requirements, architecture, UX, project management)"
  example_prompt: "Create a fullstack team to design the new authentication system with security and UX considerations"
  expected_workflow: "PM coordinates, analyst gathers requirements, architect designs system, UX reviews user impact, oracle prepares stories"
