<title>My Dev Team — Agent Visual</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent2: #bc8cff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 0 0 60px 0;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1e2e 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 40px 30px;
    text-align: center;
  }
  .header h1 {
    font-size: 2.4em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: var(--text-muted);
    font-size: 1.1em;
    margin-bottom: 24px;
  }
  /* Stats */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .stat { text-align: center; }
  .stat-value {
    font-size: 2em;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.85em;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  /* Lifecycle */
  .lifecycle {
    max-width: 1200px;
    margin: 30px auto 0;
    padding: 0 20px;
  }
  .lifecycle h2 {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .lifecycle-flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    flex-wrap: wrap;
    padding: 15px 0;
  }
  .lifecycle-step {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9em;
    font-weight: 600;
    text-align: center;
    min-width: 110px;
    cursor: default;
    transition: transform 0.15s;
  }
  .lifecycle-step:hover { transform: scale(1.08); }
  .lifecycle-arrow {
    color: var(--text-muted);
    font-size: 1.3em;
    padding: 0 6px;
  }
  .lc-analysis { background: #1a2940; color: #64b5f6; border: 1px solid #2a4060; }
  .lc-planning { background: #1a3320; color: #81c784; border: 1px solid #2a5530; }
  .lc-solution { background: #2d2440; color: #ce93d8; border: 1px solid #3d3460; }
  .lc-implement { background: #33280e; color: #ffb74d; border: 1px solid #4d3c14; }
  .lc-review { background: #301a1a; color: #ef9a9a; border: 1px solid #4a2a2a; }
  .lc-ship { background: #1a332e; color: #80cbc4; border: 1px solid #2a5548; }
  /* Filters */
  .filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 30px 20px 10px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  /* Main grid container */
  .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
  /* Category sections */
  .category {
    margin-bottom: 36px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .category-icon { font-size: 1.5em; }
  .category-title {
    font-size: 1.3em;
    font-weight: 600;
  }
  .category-count {
    font-size: 0.85em;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 12px;
  }
  .category-desc {
    font-size: 0.85em;
    color: var(--text-muted);
    margin-left: auto;
  }
  /* Agent cards grid */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  /* Agent card */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .agent-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(88, 166, 255, 0.1);
  }
  .agent-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(88, 166, 255, 0.15);
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .agent-icon {
    font-size: 2em;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 10px;
    flex-shrink: 0;
  }
  .agent-info { flex: 1; min-width: 0; }
  .agent-name {
    font-size: 1.1em;
    font-weight: 700;
  }
  .agent-title {
    font-size: 0.8em;
    color: var(--text-muted);
  }
  .module-badge {
    font-size: 0.7em;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
  }
  .badge-bmm { background: #1a2940; color: #64b5f6; }
  .badge-cis { background: #2d1f3d; color: #ce93d8; }
  .badge-bmb { background: #1a3320; color: #81c784; }
  .badge-core { background: #33280e; color: #ffb74d; }
  .agent-role {
    font-size: 0.85em;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .agent-role.expanded-text {
    display: block;
    -webkit-line-clamp: unset;
  }
  /* Expanded details */
  .card-details {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 0.85em;
  }
  .card-details.visible { display: block; }
  .detail-row {
    margin-bottom: 10px;
  }
  .detail-label {
    color: var(--accent);
    font-weight: 600;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .detail-value {
    color: var(--text-muted);
    line-height: 1.5;
  }
  .cmd-box {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em;
    color: var(--green);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .cmd-box:hover {
    border-color: var(--green);
    background: #0d2818;
  }
  .copy-icon { font-size: 0.85em; opacity: 0.6; }
  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #000;
    padding: 10px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9em;
    z-index: 100;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  /* Expand hint */
  .expand-hint {
    font-size: 0.75em;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    opacity: 0.6;
  }
  /* Hidden agent */
  .agent-card.hidden-card { display: none; }
  .category.hidden-cat { display: none; }
  /* Footer */
  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8em;
    margin-top: 40px;
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 24px 16px 20px; }
    .header h1 { font-size: 1.6em; }
    .stats-bar { gap: 20px; }
    .stat-value { font-size: 1.5em; }
    .agents-grid { grid-template-columns: 1fr; }
    .lifecycle-flow { gap: 4px; }
    .lifecycle-step { min-width: 80px; padding: 8px 10px; font-size: 0.8em; }
    .category-desc { display: none; }
  }
</style>
</head>

// ── Category display order ──────────────────────
var CATEGORY_ORDER = [
  "Orchestration", "Core Planning", "Implementation", "Quality & Testing",
  "Infrastructure", "Security & Compliance", "Domain Specialists",
  "Industry Advisors", "Creative Innovation", "Builders (Meta)", "Core Platform"
];

// ── Lifecycle phases ────────────────────────────
var PHASES = [
  { label: "Analysis", cls: "lc-analysis" },
  { label: "Planning", cls: "lc-planning" },
  { label: "Solutioning", cls: "lc-solution" },
  { label: "Implement", cls: "lc-implement" },
  { label: "Review", cls: "lc-review" },
  { label: "Ship", cls: "lc-ship" }
];

// ── Utility: create element with attributes ─────
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k) {
      if (k === "className") e.className = attrs[k];
      else if (k === "textContent") e.textContent = attrs[k];
      else e.setAttribute(k, attrs[k]);
    });
  }
  if (children) {
    children.forEach(function(c) {
      if (typeof c === "string") e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
  }
  return e;
}

// ── Build stats bar ─────────────────────────────
function buildStats() {
  var bar = document.getElementById("stats-bar");
  var stats = [
    { value: "27", label: "Agents" },
    { value: "76", label: "Commands" },
    { value: "78", label: "Workflows" },
    { value: "11", label: "Categories" }
  ];
  stats.forEach(function(s) {
    var div = el("div", { className: "stat" }, [
      el("div", { className: "stat-value", textContent: s.value }),
      el("div", { className: "stat-label", textContent: s.label })
    ]);
    bar.appendChild(div);
  });
}

// ── Build lifecycle flow ────────────────────────
function buildLifecycle() {
  var flow = document.getElementById("lifecycle-flow");
  PHASES.forEach(function(p, i) {
    if (i > 0) {
      flow.appendChild(el("span", { className: "lifecycle-arrow", textContent: "\u2192" }));
    }
    flow.appendChild(el("div", { className: "lifecycle-step " + p.cls, textContent: p.label }));
  });
}

// ── Build filter buttons ────────────────────────
function buildFilters() {
  var container = document.getElementById("filters");
  var filters = ["All"];
  CATEGORY_ORDER.forEach(function(c) { filters.push(c); });
  filters.forEach(function(f) {
    var btn = el("button", {
      className: "filter-btn" + (f === "All" ? " active" : ""),
      textContent: f
    });
    btn.setAttribute("data-filter", f);
    btn.addEventListener("click", function() {
      applyFilter(f);
    });
    container.appendChild(btn);
  });
}

// ── Apply module filter ─────────────────────────
function applyFilter(filter) {
  // Update buttons
  var btns = document.querySelectorAll(".filter-btn");
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    if (b.getAttribute("data-filter") === filter) b.className = "filter-btn active";
    else b.className = "filter-btn";
  }
  // Filter categories
  var cats = document.querySelectorAll(".category");
  for (var k = 0; k < cats.length; k++) {
    var cat = cats[k];
    var catName = cat.getAttribute("data-category");
    if (filter === "All" || catName === filter) {
      cat.classList.remove("hidden-cat");
      // Show all cards in matching categories
      var cards = cat.querySelectorAll(".agent-card");
      for (var j = 0; j < cards.length; j++) cards[j].classList.remove("hidden-card");
    } else {
      cat.classList.add("hidden-cat");
    }
  }
}

// ── Show toast ──────────────────────────────────
function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2000);
}

// ── Copy command to clipboard ───────────────────
function copyCmd(cmd, evt) {
  evt.stopPropagation();
  navigator.clipboard.writeText(cmd).then(function() {
    showToast("Copied: " + cmd);
  });
}

// ── Build a single agent card ───────────────────
function buildCard(agent) {
  var card = el("div", { className: "agent-card" });
  card.setAttribute("data-module", agent.module);

  // Top row: icon + name/title
  var iconDiv = el("div", { className: "agent-icon", textContent: agent.icon });
  var nameDiv = el("div", { className: "agent-name", textContent: agent.name });
  var titleDiv = el("div", { className: "agent-title", textContent: agent.title });
  var infoDiv = el("div", { className: "agent-info" }, [nameDiv, titleDiv]);
  var topRow = el("div", { className: "card-top" }, [iconDiv, infoDiv]);

  // Role summary
  var roleDiv = el("div", { className: "agent-role", textContent: agent.role });

  // Expand hint
  var hint = el("div", { className: "expand-hint", textContent: "Click to expand" });

  // Details (hidden initially)
  var details = el("div", { className: "card-details" });

  // Domain detail
  var domainLabel = el("div", { className: "detail-label", textContent: "Domain" });
  var domainValue = el("div", { className: "detail-value", textContent: agent.domain });
  details.appendChild(el("div", { className: "detail-row" }, [domainLabel, domainValue]));

  // When to use
  var whenLabel = el("div", { className: "detail-label", textContent: "When to Use" });
  var whenValue = el("div", { className: "detail-value", textContent: agent.when });
  details.appendChild(el("div", { className: "detail-row" }, [whenLabel, whenValue]));

  // Communication style
  var styleLabel = el("div", { className: "detail-label", textContent: "Communication Style" });
  var styleValue = el("div", { className: "detail-value", textContent: agent.style });
  details.appendChild(el("div", { className: "detail-row" }, [styleLabel, styleValue]));

  // Command
  var cmdLabel = el("div", { className: "detail-label", textContent: "Slash Command" });
  var cmdText = document.createTextNode(agent.cmd);
  var copyIcon = el("span", { className: "copy-icon", textContent: "\uD83D\uDCCB" });
  var cmdBox = el("div", { className: "cmd-box" }, [cmdText, copyIcon]);
  cmdBox.addEventListener("click", function(e) { copyCmd(agent.cmd, e); });
  var cmdRow = el("div", { className: "detail-row" }, [cmdLabel, cmdBox]);
  details.appendChild(cmdRow);

  // Assemble card
  card.appendChild(topRow);
  card.appendChild(roleDiv);
  card.appendChild(hint);
  card.appendChild(details);

  // Toggle expand on click
  card.addEventListener("click", function() {
    var isExpanded = card.classList.contains("expanded");
    card.classList.toggle("expanded");
    if (isExpanded) {
      details.classList.remove("visible");
      roleDiv.classList.remove("expanded-text");
      hint.textContent = "Click to expand";
    } else {
      details.classList.add("visible");
      roleDiv.classList.add("expanded-text");
      hint.textContent = "Click to collapse";
    }
  });

  return card;
}

// ── Build all category sections ─────────────────
function buildMain() {
  var main = document.getElementById("main");

  // Group agents by category
  var groups = {};
  AGENTS.forEach(function(a) {
    if (!groups[a.category]) {
      groups[a.category] = { agents: [], icon: a.catIcon, desc: a.catDesc };
    }
    groups[a.category].agents.push(a);
  });

  // Render in order
  CATEGORY_ORDER.forEach(function(catName) {
    var group = groups[catName];
    if (!group) return;

    var section = el("div", { className: "category" });
    section.setAttribute("data-category", catName);

    // Category header
    var hdrIcon = el("span", { className: "category-icon", textContent: group.icon });
    var hdrTitle = el("span", { className: "category-title", textContent: catName });
    var hdrCount = el("span", { className: "category-count", textContent: group.agents.length + " agent" + (group.agents.length !== 1 ? "s" : "") });
    var hdrDesc = el("span", { className: "category-desc", textContent: group.desc });
    var header = el("div", { className: "category-header" }, [hdrIcon, hdrTitle, hdrCount, hdrDesc]);

    section.appendChild(header);

    // Grid of agent cards
    var grid = el("div", { className: "agents-grid" });
    group.agents.forEach(function(a) {
      grid.appendChild(buildCard(a));
    });
    section.appendChild(grid);

    main.appendChild(section);
  });
}

  footer.appendChild(document.createElement("br"));
  var small = el("span", { textContent: "Click any card to expand details \u2022 Click slash command to copy" });

}
